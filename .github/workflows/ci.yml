name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-extras --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src
      - run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - name: Verify build artifact synced to backend
        working-directory: ${{ github.workspace }}
        run: |
          test -f src/twrminal/web/dist/index.html || {
            echo "::error::frontend build did not produce src/twrminal/web/dist/index.html"
            exit 1
          }
          test -d src/twrminal/web/dist/_app || {
            echo "::error::frontend build did not produce src/twrminal/web/dist/_app"
            exit 1
          }
